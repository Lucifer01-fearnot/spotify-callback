<!DOCTYPE html>
<html>
<head><title>Spotify Auth</title></head>
<body>
<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code) {
    const EXTENSION_ID = 'liepaifgmabincjpplolkdanbjahedpi';
    chrome.runtime.sendMessage(EXTENSION_ID, { type: 'SPOTIFY_CODE', code }, () => {
      document.body.innerText = 'Connected! You can close this tab.';
    });
  } else {
    document.body.innerText = 'No code found.';
  }
</script>
</body>
</html>
