<!DOCTYPE html>
<html>
<head><title>Spotify Auth</title></head>
<body>
<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code) {
    document.body.innerText = 'Authenticated! You can close this tab.';
  } else {
    document.body.innerText = 'No code found.';
  }
</script>
</body>
</html>
